name: Build Page French Production (BunnyCDN)

on:
  repository_dispatch:
    types: [ build-page-french-production ]
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/reusable-build-production-bunny.yml
    with:
      product_repo: "aspose-page/Aspose.Page-API-References"
      product_name: "page"
      disable_languages: '["en","ru","zh","ar","de","el","hi","id","it","ja","ko","nl","es","sv","tr"]'
      theme_ref: "beta"
    secrets: inherit
