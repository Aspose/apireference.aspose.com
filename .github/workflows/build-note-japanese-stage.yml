name: Build Note Japanese Stage

on:
  repository_dispatch:
    types: [ build-note-japanese-stage ]
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/reusable-build-stage.yml
    with:
      product_repo: "aspose-note/Aspose.Note-API-References"
      product_name: "note"
      disable_languages: '["en","ru","zh","ar","fr","de","el","hi","id","it","ko","nl","es","sv","tr"]'
      cf_path: "/note/*"
      theme_ref: "beta"
    secrets: inherit
