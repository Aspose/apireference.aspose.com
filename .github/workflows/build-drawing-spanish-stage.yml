name: Build Drawing Spanish Stage

on:
  repository_dispatch:
    types: [ build-drawing-spanish-stage ]
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/reusable-build-stage.yml
    with:
      product_repo: "aspose-drawing/Aspose.Drawing-API-Reference"
      product_name: "drawing"
      disable_languages: '["en","ru","zh","ar","fr","de","el","hi","id","it","ja","ko","nl","sv","tr"]'
      cf_path: "/drawing/*"
      theme_ref: "beta"
    secrets: inherit
