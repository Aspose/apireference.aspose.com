name: Build Tex Swedish Production (BunnyCDN)

on:
  repository_dispatch:
    types: [ build-tex-swedish-production ]
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/reusable-build-production-bunny.yml
    with:
      product_repo: "aspose-tex/Aspose.TeX-API-References"
      product_name: "tex"
      disable_languages: '["en","ru","zh","ar","fr","de","it","es","tr"]'
      theme_ref: "beta"
    secrets: inherit
