name: Build Cells Arabic Stage

on:
  repository_dispatch:
    types: [ build-cells-arabic-stage ]
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/reusable-build-stage.yml
    with:
      product_repo: "aspose-cells/Aspose.Cells-API-References"
      product_name: "cells"
      disable_languages: '["en","ru","zh","fr","de","it","es","sv","tr"]'
      cf_path: "/cells/ar/*"
      theme_ref: "beta"
    secrets: inherit
