name: Build Cells-python-net French Production

on:
  repository_dispatch:
    types: [ build-cells-python-net-french-production ]
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/reusable-build-production.yml
    with:
      product_repo: "aspose-cells/Aspose.Cells-Python-NET-API-References"
      product_name: "cells-python-net"
      disable_languages: '["en","ru","zh","ar","de","it","es","sv","tr"]'
      cf_path: "/cells/python-net/fr/*"
      theme_ref: "beta"
    secrets: inherit
