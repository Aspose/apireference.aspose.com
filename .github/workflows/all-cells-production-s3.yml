name: All CELLS Production Workflows (S3)

on:
  workflow_dispatch:

jobs:
  trigger-all:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger build-cells-arabic-production
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: build-cells-arabic-production.yml
