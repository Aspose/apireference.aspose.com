name: Build Gis German Production

on:
  repository_dispatch:
    types: [ build-gis-german-production ]
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/reusable-build-production.yml
    with:
      product_repo: "aspose-gis/Aspose.GIS-API-Reference"
      product_name: "gis"
      disable_languages: '["en","ru","zh","ar","fr","el","hi","id","it","ja","ko","nl","es","sv","tr"]'
      cf_path: "/gis/*"
      theme_ref: "beta"
    secrets: inherit
