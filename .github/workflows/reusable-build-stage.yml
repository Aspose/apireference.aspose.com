name: Reusable Stage Build

on:
  workflow_call:
    inputs:
      product_repo:
        required: true
        type: string
      product_name:
        required: true
        type: string
      disable_languages:
        required: true
        type: string
      cf_path:
        required: true
        type: string
      theme_ref:
        required: false
        type: string
        default: main
    secrets:
      REPO_TOKEN:
        required: true
      ACCESS_KEY:
        required: true
      SECRET_ACCESS:
        required: true
      AWS_DISTRIBUTION:
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Hugo site
        uses: actions/checkout@v2
        with:
          fetch-depth: 1

      - name: Checkout theme
        uses: actions/checkout@v2
        with:
          repository: Aspose/api-theme
          token: ${{ secrets.REPO_TOKEN }}
          ref: ${{ inputs.theme_ref }}
          fetch-depth: 1
          path: themes/api-theme

      - name: Checkout product content
        uses: actions/checkout@v2
        with:
          repository: ${{ inputs.product_repo }}
          token: ${{ secrets.REPO_TOKEN }}
          fetch-depth: 1
          path: content/sites/aspose/${{ inputs.product_name }}

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.119.0'
          extended: true

      - name: Cache node modules
        uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package.json') }}
          restore-keys: ${{ runner.os }}-node-

      - name: Install Dependencies
        run: npm install -D --save autoprefixer postcss-cli

      - name: Configure language
        run: |
          CONFIG="config/sites/aspose/${{ inputs.product_name }}/staging/config.toml"
          ALL=$(grep -oP '\[languages\.\K[a-z-]+' "config/sites/aspose/${{ inputs.product_name }}/_default/config.toml" | sort -u)
          DISABLE_LANGS='${{ inputs.disable_languages }}'
          DISABLED=$(echo "$DISABLE_LANGS" | tr -d '[]"' | tr ',' '\n' | sed 's/^[[:space:]]*//' | sort -u)
          TARGET=$(comm -23 <(echo "$ALL") <(echo "$DISABLED"))
          { echo "enableGitInfo = false"; echo "defaultContentLang = '${TARGET}'"; echo "disableLanguages = ${DISABLE_LANGS}"; cat "$CONFIG"; } > "${CONFIG}.tmp" && mv "${CONFIG}.tmp" "$CONFIG"

      - name: Build
        run: hugo --configDir config/sites/aspose/${{ inputs.product_name }} --environment staging --minify

      - name: Deploy to S3
        run: hugo --configDir config/sites/aspose/${{ inputs.product_name }} --environment staging deploy --target "Stage" --maxDeletes 0
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SECRET_ACCESS }}

      - name: Invalidate CloudFront
        uses: chetan/invalidate-cloudfront-action@v2
        env:
          DISTRIBUTION: ${{ secrets.AWS_DISTRIBUTION }}
          PATHS: ${{ inputs.cf_path }}
          AWS_REGION: 'us-west-2'
          AWS_ACCESS_KEY_ID: ${{ secrets.ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SECRET_ACCESS }}
