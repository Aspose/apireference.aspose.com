name: Build Pub Arabic Production (BunnyCDN)

on:
  repository_dispatch:
    types: [ build-pub-arabic-production ]
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/reusable-build-production-bunny.yml
    with:
      product_repo: "aspose-pub/Aspose.PUB-API-References"
      product_name: "pub"
      disable_languages: '["en","ru","zh","fr","de","it","es","sv","tr"]'
      theme_ref: "beta"
    secrets: inherit
