name: Build Cells Italian Production

on:
  repository_dispatch:
    types: [ build-cells-italian-production ]
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/reusable-build-production.yml
    with:
      product_repo: "aspose-cells/Aspose.Cells-API-References"
      product_name: "cells"
      disable_languages: '["en","ru","zh","ar","fr","de","es","sv","tr"]'
      cf_path: "/cells/it/*"
      theme_ref: "beta"
    secrets: inherit
