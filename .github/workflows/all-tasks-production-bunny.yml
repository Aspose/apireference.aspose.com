name: All TASKS Production Workflows (BunnyCDN)

on:
  workflow_dispatch:

jobs:
  trigger-all:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger build-tasks-arabic-production-bunny
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: build-tasks-arabic-production-bunny.yml
          token: ${{ secrets.REPO_TOKEN }}

