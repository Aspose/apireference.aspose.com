name: Build Finance Korean Production

on:
  repository_dispatch:
    types: [ build-finance-korean-production ]
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/reusable-build-production.yml
    with:
      product_repo: "aspose-finance/Aspose.Finance-API-References"
      product_name: "finance"
      disable_languages: '["en","ru","zh","ar","fr","de","el","hi","id","it","ja","nl","es","sv","tr"]'
      cf_path: "/finance/*"
      theme_ref: "beta"
    secrets: inherit
