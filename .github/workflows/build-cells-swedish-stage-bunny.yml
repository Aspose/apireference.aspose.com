name: Build Cells Swedish Stage (BunnyCDN)

on:
  repository_dispatch:
    types: [ build-cells-swedish-stage ]
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/reusable-build-stage-bunny.yml
    with:
      product_repo: "aspose-cells/Aspose.Cells-API-References"
      product_name: "cells"
      disable_languages: '["en","ru","zh","ar","fr","de","it","es","tr"]'
      theme_ref: "beta"
    secrets: inherit
