name: Build Html Indian Stage (BunnyCDN)

on:
  repository_dispatch:
    types: [ build-html-indian-stage ]
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/reusable-build-stage-bunny.yml
    with:
      product_repo: "aspose-html/Aspose.HTML-API-References"
      product_name: "html"
      disable_languages: '["en","ru","zh","ar","fr","de","el","id","it","ja","ko","nl","es","sv","tr"]'
      theme_ref: "beta"
    secrets: inherit
