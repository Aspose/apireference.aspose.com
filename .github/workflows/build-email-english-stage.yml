name: Build Email English Stage

on:
  repository_dispatch:
    types: [ build-email-english-stage ]
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/reusable-build-stage.yml
    with:
      product_repo: "aspose-email/Aspose.Email-API-References"
      product_name: "email"
      disable_languages: '["ru","zh"]'
      cf_path: "/email/*"
      theme_ref: "beta"
    secrets: inherit
