name: Build Cells Chinese Production

on:
  repository_dispatch:
    types: [ build-cells-chinese-production ]
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/reusable-build-production.yml
    with:
      product_repo: "aspose-cells/Aspose.Cells-API-References"
      product_name: "cells"
      disable_languages: '["en","ru","ar","fr","de","it","es","sv","tr"]'
      cf_path: "/cells/zh/*"
      theme_ref: "beta"
    secrets: inherit
