name: Build Email Russian Production (BunnyCDN)

on:
  repository_dispatch:
    types: [ build-email-russian-production ]
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/reusable-build-production-bunny.yml
    with:
      product_repo: "aspose-email/Aspose.Email-API-References"
      product_name: "email"
      disable_languages: '["en","zh"]'
      theme_ref: "beta"
    secrets: inherit
