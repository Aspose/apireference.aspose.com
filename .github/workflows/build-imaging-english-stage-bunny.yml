name: Build Imaging English Stage (BunnyCDN)

on:
  repository_dispatch:
    types: [ build-imaging-english-stage ]
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/reusable-build-stage-bunny.yml
    with:
      product_repo: "aspose-imaging/Aspose.Imaging-API-References"
      product_name: "imaging"
      disable_languages: '["ru","zh","ar","fr","de","it","es","sv","tr"]'
      theme_ref: "beta"
    secrets: inherit
