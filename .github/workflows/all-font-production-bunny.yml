name: All FONT Production Workflows (BunnyCDN)

on:
  workflow_dispatch:

jobs:
  trigger-all:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger build-font-arabic-production-bunny
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: build-font-arabic-production-bunny.yml
          token: ${{ secrets.REPO_TOKEN }}

      - name: Trigger build-font-chinese-production-bunny
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: build-font-chinese-production-bunny.yml
          token: ${{ secrets.REPO_TOKEN }}

      - name: Trigger build-font-english-production-bunny
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: build-font-english-production-bunny.yml
          token: ${{ secrets.REPO_TOKEN }}

      - name: Trigger build-font-french-production-bunny
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: build-font-french-production-bunny.yml
          token: ${{ secrets.REPO_TOKEN }}

      - name: Trigger build-font-german-production-bunny
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: build-font-german-production-bunny.yml
          token: ${{ secrets.REPO_TOKEN }}

      - name: Trigger build-font-italian-production-bunny
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: build-font-italian-production-bunny.yml
          token: ${{ secrets.REPO_TOKEN }}

      - name: Trigger build-font-russian-production-bunny
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: build-font-russian-production-bunny.yml
          token: ${{ secrets.REPO_TOKEN }}

      - name: Trigger build-font-spanish-production-bunny
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: build-font-spanish-production-bunny.yml
          token: ${{ secrets.REPO_TOKEN }}

      - name: Trigger build-font-swedish-production-bunny
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: build-font-swedish-production-bunny.yml
          token: ${{ secrets.REPO_TOKEN }}

      - name: Trigger build-font-turkish-production-bunny
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: build-font-turkish-production-bunny.yml
          token: ${{ secrets.REPO_TOKEN }}

