name: Build Barcode English Stage

on:
  repository_dispatch:
    types: [ build-barcode-english-stage ]
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/reusable-build-stage.yml
    with:
      product_repo: "aspose-barcode/Aspose.BarCode-API-References"
      product_name: "barcode"
      disable_languages: '["ru","zh","ar","fr","de","el","hi","id","it","ja","ko","nl","es","sv","tr"]'
      cf_path: "/barcode/*"
      theme_ref: "beta"
    secrets: inherit
