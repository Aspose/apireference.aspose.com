name: Build Tasks Indian Production (BunnyCDN)

on:
  repository_dispatch:
    types: [ build-tasks-indian-production ]
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/reusable-build-production-bunny.yml
    with:
      product_repo: "aspose-tasks/Aspose.Tasks-API-References"
      product_name: "tasks"
      disable_languages: '["en","ru","zh","ar","fr","de","el","id","it","ja","ko","nl","es","sv","tr"]'
      theme_ref: "beta"
    secrets: inherit
