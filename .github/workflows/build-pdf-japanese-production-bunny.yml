name: Build Pdf Japanese Production (BunnyCDN)

on:
  repository_dispatch:
    types: [ build-pdf-japanese-production ]
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/reusable-build-production-bunny.yml
    with:
      product_repo: "aspose-pdf/Aspose.PDF-API-References"
      product_name: "pdf"
      disable_languages: '["en","ru","zh","ar","fr","de","id","it","ko","pt","es","sv","tr"]'
      theme_ref: "beta"
    secrets: inherit
