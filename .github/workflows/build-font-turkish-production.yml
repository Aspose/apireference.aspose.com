name: Build Font Turkish Production

on:
  repository_dispatch:
    types: [ build-font-turkish-production ]
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/reusable-build-production.yml
    with:
      product_repo: "aspose-font/Aspose.Font-API-References"
      product_name: "font"
      disable_languages: '["en","ru","zh","ar","fr","de","it","es","sv"]'
      cf_path: "/font/tr/*"
      theme_ref: "beta"
    secrets: inherit
