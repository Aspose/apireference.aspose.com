name: Build Zip Spanish Production

on:
  repository_dispatch:
    types: [ build-zip-spanish-production ]
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/reusable-build-production.yml
    with:
      product_repo: "aspose-zip/Aspose.ZIP-API-References"
      product_name: "zip"
      disable_languages: '["en","ru","zh","ar","fr","de","el","hi","id","it","ja","ko","nl","sv","tr"]'
      cf_path: "/zip/*"
      theme_ref: "beta"
    secrets: inherit
