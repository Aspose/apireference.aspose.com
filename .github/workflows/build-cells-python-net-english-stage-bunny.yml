name: Build Cells-python-net English Stage (BunnyCDN)

on:
  repository_dispatch:
    types: [ build-cells-python-net-english-stage ]
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/reusable-build-stage-bunny.yml
    with:
      product_repo: "aspose-cells/Aspose.Cells-Python-NET-API-References"
      product_name: "cells-python-net"
      disable_languages: '["ru","zh","ar","fr","de","it","es","sv","tr"]'
      theme_ref: "beta"
    secrets: inherit
