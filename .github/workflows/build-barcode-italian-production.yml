name: Build Barcode Italian Production

on:
  repository_dispatch:
    types: [ build-barcode-italian-production ]
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/reusable-build-production.yml
    with:
      product_repo: "aspose-barcode/Aspose.BarCode-API-References"
      product_name: "barcode"
      disable_languages: '["en","ru","zh","ar","fr","de","el","hi","id","ja","ko","nl","es","sv","tr"]'
      cf_path: "/barcode/it/*"
      theme_ref: "beta"
    secrets: inherit
