name: Build Finance Italian Stage

on:
  repository_dispatch:
    types: [ build-finance-italian-stage ]
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/reusable-build-stage.yml
    with:
      product_repo: "aspose-finance/Aspose.Finance-API-References"
      product_name: "finance"
      disable_languages: '["en","ru","zh","ar","fr","de","el","hi","id","ja","ko","nl","es","sv","tr"]'
      cf_path: "/finance/*"
      theme_ref: "beta"
    secrets: inherit
