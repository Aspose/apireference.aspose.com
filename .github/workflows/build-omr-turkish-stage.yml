name: Build OMR Turkish Stage

on:
  repository_dispatch:
    types: [ build-omr-turkish-stage ]
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/reusable-build-stage.yml
    with:
      product_repo: "aspose-omr/Aspose.OMR-API-References"
      product_name: "omr"
      disable_languages: '["en","ru","zh","ar","fr","de","el","hi","id","it","ja","ko","nl","es","sv"]'
      cf_path: "/omr/*"
      theme_ref: "beta"
    secrets: inherit
