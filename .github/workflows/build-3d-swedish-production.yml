name: Build 3d Swedish Production

on:
  repository_dispatch:
    types: [ build-3d-swedish-production ]
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/reusable-build-production.yml
    with:
      product_repo: "aspose-3d/Aspose.3D-API-References"
      product_name: "3d"
      disable_languages: '["en","ru","zh","ar","fr","de","el","hi","id","it","ja","ko","nl","es","tr"]'
      cf_path: "/3d/sv/*"
      theme_ref: "beta"
    secrets: inherit
