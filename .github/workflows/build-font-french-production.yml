name: Build Font French Production

on:
  repository_dispatch:
    types: [ build-font-french-production ]
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/reusable-build-production.yml
    with:
      product_repo: "aspose-font/Aspose.Font-API-References"
      product_name: "font"
      disable_languages: '["en","ru","zh","ar","de","it","es","sv","tr"]'
      cf_path: "/font/fr/*"
      theme_ref: "beta"
    secrets: inherit
