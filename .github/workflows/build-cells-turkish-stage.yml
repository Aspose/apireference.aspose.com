name: Build Cells Turkish Stage

on:
  repository_dispatch:
    types: [ build-cells-turkish-stage ]
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/reusable-build-stage.yml
    with:
      product_repo: "aspose-cells/Aspose.Cells-API-References"
      product_name: "cells"
      disable_languages: '["en","ru","zh","ar","fr","de","it","es","sv"]'
      cf_path: "/cells/tr/*"
      theme_ref: "beta"
    secrets: inherit
