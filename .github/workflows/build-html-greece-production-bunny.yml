name: Build Html Greece Production (BunnyCDN)

on:
  repository_dispatch:
    types: [ build-html-greece-production ]
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/reusable-build-production-bunny.yml
    with:
      product_repo: "aspose-html/Aspose.HTML-API-References"
      product_name: "html"
      disable_languages: '["en","ru","zh","ar","fr","de","hi","id","it","ja","ko","nl","es","sv","tr"]'
      theme_ref: "beta"
    secrets: inherit
