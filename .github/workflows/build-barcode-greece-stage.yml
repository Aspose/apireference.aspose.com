name: Build Barcode Greece Stage

on:
  repository_dispatch:
    types: [ build-barcode-greece-stage ]
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/reusable-build-stage.yml
    with:
      product_repo: "aspose-barcode/Aspose.BarCode-API-References"
      product_name: "barcode"
      disable_languages: '["en","ru","zh","ar","fr","de","hi","id","it","ja","ko","nl","es","sv","tr"]'
      cf_path: "/barcode/el/*"
      theme_ref: "beta"
    secrets: inherit
