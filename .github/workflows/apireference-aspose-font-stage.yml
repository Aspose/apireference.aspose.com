name: qa-reference.aspose.com(finance)(Stage)

on:
  push:
    branches: [ main ]
    paths:
      - 'content/sites/aspose/finance/**'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false    # if one group fails, others keep running
      matrix:
        include:
          - group: "en-ru-zh-ar"
            disable: "fr,de,it,es,sv,tr,ja,hi,ko,el,id,nl"
          - group: "fr-de-it-es"
            disable: "en,ru,zh,ar,sv,tr,ja,hi,ko,el,id,nl"
          - group: "sv-tr-ja-hi"
            disable: "en,ru,zh,ar,fr,de,it,es,ko,el,id,nl"
          - group: "ko-el-id-nl"
            disable: "en,ru,zh,ar,fr,de,it,es,sv,tr,ja,hi"

    steps:
      - name: Checkout
        uses: actions/checkout@v2
        with:
          submodules: true
          fetch-depth: 1

      - name: Checkout theme repo
        uses: actions/checkout@main
        with:
          repository: Aspose/api-theme
          token: ${{ secrets.REPO_TOKEN }}
          fetch-depth: 1
          path: themes/api-theme

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.119.0'
          extended: true

      - name: Cache node modules
        uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-

      - name: Install Dependencies
        run: npm install -D --save autoprefixer postcss-cli

      - name: Build
        run: |
          hugo --configDir config/sites/aspose/finance \
               --environment staging \
               --disableLanguages "${{ matrix.disable }}" \
               --minify

      - name: Deploy to S3
        run: |
          hugo --configDir config/sites/aspose/finance \
               --environment staging \
               deploy --target "Stage" --maxDeletes 0
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SECRET_ACCESS }}

  invalidate:
    needs: build    # waits for ALL 4 matrix jobs to finish
    runs-on: ubuntu-latest
    steps:
      - name: Invalidate CloudFront
        uses: chetan/invalidate-cloudfront-action@v2
        env:
          DISTRIBUTION: ${{ secrets.AWS_DISTRIBUTION }}
          PATHS: /finance/*
          AWS_REGION: 'us-west-2'
          AWS_ACCESS_KEY_ID: ${{ secrets.ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SECRET_ACCESS }}
