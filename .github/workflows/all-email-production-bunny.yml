name: All EMAIL Production Workflows (BunnyCDN)

on:
  workflow_dispatch:

jobs:
  trigger-all:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger build-email-chinese-production-bunny
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: build-email-chinese-production-bunny.yml
          token: ${{ secrets.REPO_TOKEN }}

      - name: Trigger build-email-english-production-bunny
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: build-email-english-production-bunny.yml
          token: ${{ secrets.REPO_TOKEN }}

      - name: Trigger build-email-russian-production-bunny
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: build-email-russian-production-bunny.yml
          token: ${{ secrets.REPO_TOKEN }}

