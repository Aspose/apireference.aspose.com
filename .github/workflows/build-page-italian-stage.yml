name: Build Page Italian Stage

on:
  repository_dispatch:
    types: [ build-page-italian-stage ]
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/reusable-build-stage.yml
    with:
      product_repo: "aspose-page/Aspose.Page-API-References"
      product_name: "page"
      disable_languages: '["en","ru","zh","ar","fr","de","el","hi","id","ja","ko","nl","es","sv","tr"]'
      cf_path: "/page/*"
      theme_ref: "beta"
    secrets: inherit
