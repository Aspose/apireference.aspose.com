name: Build Pub Swedish Production

on:
  repository_dispatch:
    types: [ build-pub-swedish-production ]
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/reusable-build-production.yml
    with:
      product_repo: "aspose-pub/Aspose.PUB-API-References"
      product_name: "pub"
      disable_languages: '["en","ru","zh","ar","fr","de","it","es","tr"]'
      cf_path: "/pub/*"
      theme_ref: "beta"
    secrets: inherit
