name: Build Barcode Spanish Production

on:
  repository_dispatch:
    types: [ build-barcode-spanish-production ]
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/reusable-build-production.yml
    with:
      product_repo: "aspose-barcode/Aspose.BarCode-API-References"
      product_name: "barcode"
      disable_languages: '["en","ru","zh","ar","fr","de","el","hi","id","it","ja","ko","nl","sv","tr"]'
      cf_path: "/barcode/es/*"
      theme_ref: "beta"
    secrets: inherit
