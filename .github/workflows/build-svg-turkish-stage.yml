name: Build SVG Turkish Stage

on:
  repository_dispatch:
    types: [ build-svg-turkish-stage ]
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/reusable-build-stage.yml
    with:
      product_repo: "aspose-svg/Aspose.SVG-API-References"
      product_name: "svg"
      disable_languages: '["en","ru","zh","ar","fr","de","el","hi","id","it","ja","ko","nl","es","sv"]'
      cf_path: "/svg/*"
      theme_ref: "beta"
    secrets: inherit
