name: Build Page English Stage (BunnyCDN)

on:
  repository_dispatch:
    types: [ build-page-english-stage ]
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/reusable-build-stage-bunny.yml
    with:
      product_repo: "aspose-page/Aspose.Page-API-References"
      product_name: "page"
      disable_languages: '["ru","zh","ar","fr","de","el","hi","id","it","ja","ko","nl","es","sv","tr"]'
      theme_ref: "beta"
    secrets: inherit
