name: Build PSD Spanish Stage

on:
  repository_dispatch:
    types: [ build-psd-spanish-stage ]
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/reusable-build-stage.yml
    with:
      product_repo: "aspose-psd/Aspose.PSD-API-References"
      product_name: "psd"
      disable_languages: '["en","ru","zh","ar","fr","de","el","hi","id","it","ja","ko","nl","sv","tr"]'
      cf_path: "/psd/*"
      theme_ref: "beta"
    secrets: inherit
