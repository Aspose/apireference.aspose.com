name: Build HTML Japanese Stage

on:
  repository_dispatch:
    types: [ build-html-japanese-stage ]
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/reusable-build-stage.yml
    with:
      product_repo: "aspose-html/Aspose.HTML-API-References"
      product_name: "html"
      disable_languages: '["en","ru","zh","ar","fr","de","el","hi","id","it","ko","nl","es","sv","tr"]'
      cf_path: "/html/*"
      theme_ref: "beta"
    secrets: inherit
